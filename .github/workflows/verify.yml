name: Verificar Atualização Diária

on:
  schedule:
    - cron: "15 0 * * 2-6" # 21:15 BRT — após todas as tentativas
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Determine target date
        id: target
        run: |
          TARGET=$(uv run python -c '
          from update import determine_target_date, is_special_holiday
          target = determine_target_date()
          if is_special_holiday(target):
              print("skip")
          else:
              print(target.isoformat())
          ')
          echo "target_date=$TARGET" >> $GITHUB_OUTPUT

      - name: Verify release data
        if: steps.target.outputs.target_date != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-${{ steps.target.outputs.target_date }}"
          
          mkdir -p release_staging
          if ! gh release download "$TAG" --pattern "b3_futures.parquet" --dir release_staging 2>/dev/null; then
            echo "missing=true" >> $GITHUB_ENV
            echo "reason=Release $TAG não encontrado" >> $GITHUB_ENV
            exit 0
          fi

          result=$(uv run python -c "
          import polars as pl
          df = pl.read_parquet('release_staging/b3_futures.parquet')
          has = df.filter(pl.col('TradDt') == '${{ steps.target.outputs.target_date }}').height > 0
          print('false' if has else 'true')
          ")
          echo "missing=$result" >> $GITHUB_ENV
          if [[ "$result" == "true" ]]; then
            echo "reason=Release $TAG existe mas não contém dados de DI para ${{ steps.target.outputs.target_date }}" >> $GITHUB_ENV
          fi

      - name: Open issue if data is missing
        if: env.missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ Dados não atualizados: ${{ steps.target.outputs.target_date }}"
          BODY="${{ env.reason }}

          Todas as tentativas de atualização falharam. Verificar manualmente.

          **Ação:** executar workflow \`update.yml\` via workflow_dispatch."
          
          # Evita duplicatas
          existing=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' || echo "")
          if [[ -z "$existing" ]]; then
            gh issue create --title "$TITLE" --body "$BODY" --label "bug"
          fi

name: Verificação de Dados

on:
  schedule:
    - cron: "00 11 * * 2-6" # 08:00 BRT — após as 3 tentativas de atualização
  workflow_dispatch:

jobs:
  check-datasets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Download data from Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_staging
          gh release download --pattern "*.parquet" --dir release_staging

      - name: Check datasets
        run: uv run --frozen --no-dev python check.py

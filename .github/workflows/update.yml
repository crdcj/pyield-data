name: Atualização DI e Anbima (Artifact-Based)

on:
  schedule:
    - cron: "00 23 * * 1-5" # 20:00 BRT (1ª tentativa)
    - cron: "30 02 * * 2-6" # 23:00 BRT (2ª tentativa)
  workflow_dispatch:

jobs:
  update-datasets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: uv venv
    
      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Determine target date
        id: target
        run: |
          result=$(uv run python -c '
          from update import determine_target_date, is_special_holiday
          target = determine_target_date()
          should_run = not is_special_holiday(target)
          fmt = "%d-%m-%Y"
          print(f"{target.isoformat()}|{target.strftime(fmt)}|{str(should_run).lower()}")
          ')
          IFS='|' read -r TARGET_DATE DATE_BR SHOULD_RUN <<< "$result"
          echo "target_date=$TARGET_DATE" >> $GITHUB_OUTPUT
          echo "tag=data-$TARGET_DATE" >> $GITHUB_OUTPUT
          echo "date_br=$DATE_BR" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "📅 Target date: $TARGET_DATE (should_run=$SHOULD_RUN)"

      - name: Download data from Latest Release
        if: steps.target.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Baixando arquivos do último release..."
          mkdir -p release_staging
          gh release download --pattern "*" --dir release_staging || echo "⚠️ Nenhum release encontrado."
          ls -R release_staging/

      - name: Run update script
        if: steps.target.outputs.should_run == 'true'
        run: uv run python update.py ${{ steps.target.outputs.target_date }}

      - name: Create or Update Release
        if: steps.target.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.target.outputs.tag }}"
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "📦 Release $TAG existe, atualizando assets..."
            gh release upload "$TAG" release_staging/* --clobber
          else
            echo "🚀 Criando release $TAG..."
            gh release create "$TAG" \
              release_staging/* \
              --title "Dados ${{ steps.target.outputs.date_br }}" \
              --notes "Atualização automática diária via Artifact-based workflow." \
              --latest
          fi

      - name: Delete old releases (Keep last 30)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[] | .tagName' | \
          tail -n +31 | \
          xargs -I {} gh release delete {} --yes
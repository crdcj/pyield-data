name: Atualização DI e Anbima

on:
  schedule:
    - cron: "30 23 * * 1-5" # 20:30 BRT (1ª tentativa)
    - cron: "30 02 * * 2-6" # 23:30 BRT (2ª tentativa)
  workflow_dispatch:

jobs:
  update-datasets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: uv venv
    
      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Download data from Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_staging
          gh release download --latest --pattern "*.parquet" --dir release_staging

      - name: Run update script
        run: uv run python update.py

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-$(TZ=America/Sao_Paulo date +%Y-%m-%d)"
          DATE_BR=$(TZ=America/Sao_Paulo date +%d-%m-%Y)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release_staging/* --clobber
          else
            gh release create "$TAG" release_staging/* --title "Dados $DATE_BR" --notes "Atualização automática diária." --latest
          fi

      - name: Delete old releases (keep last 30)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' | \
          tail -n +31 | \
          xargs -I {} gh release delete {} --yes
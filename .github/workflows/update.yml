name: Atualização DI e Anbima (Artifact-Based)

on:
  schedule:
    - cron: "45 21 * * 1-5" # 18:45 BRT (1ª tentativa)
    - cron: "15 22 * * 1-5" # 19:15 BRT (2ª tentativa)
    - cron: "45 22 * * 1-5" # 19:45 BRT (3ª tentativa)
    - cron: "15 23 * * 1-5" # 20:15 BRT (4ª tentativa)
    - cron: "45 23 * * 1-5" # 20:45 BRT (5ª tentativa)
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if today's release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TZ="America/Sao_Paulo"
          TAG="data-$(date +'%Y-%m-%d')"
          if [[ "${{ github.event_name }}" == "schedule" ]] && gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "✅ Release $TAG already exists. Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  update-datasets:
    needs: check-release
    if: needs.check-release.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: uv venv
    
      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Download data from Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Baixando arquivos do último release..."
          mkdir -p release_staging
          # Baixar todos os arquivos (assets) do release marcado como 'Latest'
          gh release download --pattern "*" --dir release_staging
          
          echo "✅ Arquivos recuperados:"
          ls -R release_staging/

      - name: Run update script
        run: |
          # O script Python agora encontrará os arquivos na pasta release_staging/
          uv run python update.py

      - name: Check for changes (Timezone Strategy)
        id: check_changes
        run: |
          export TZ="America/Sao_Paulo"
          echo "date_tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "date_br=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT          
          echo "has_changes=true" >> $GITHUB_OUTPUT

      # --- PASSO MODIFICADO: Publicar novo estado ---
      - name: Create New Release
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-${{ steps.check_changes.outputs.date_tag }}"
          
          # Limpeza de segurança para permitir re-execuções no mesmo dia
          gh release delete "$TAG" --yes || true
          git tag -d "$TAG" || true
          git push --delete origin "$TAG" || true
          sleep 5

          # Cria o release e sobe TODOS os arquivos de release_staging/
          # O uso do 'release_staging/*' garante o espelhamento total.
          gh release create "$TAG" \
            release_staging/* \
            --title "Dados ${{ steps.check_changes.outputs.date_br }}" \
            --notes "Atualização automática diária via Artifact-based workflow." \
            --latest

      - name: Delete old releases (Keep last 30)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[] | .tagName' | \
          tail -n +31 | \
          xargs -I {} gh release delete {} --yes